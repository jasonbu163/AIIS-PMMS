name: aiis-pmms-mssql

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: aiis-pmms-mssql-standalone
    env_file:
      - .env.mssql.example
      - path: .env.mssql
        required: false
    environment:
      ACCEPT_EULA: "Y"
      TZ: Asia/Shanghai
    ports:
      - "1433:1433"
    volumes:
      - mssql-standalone-data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S 127.0.0.1 -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" >/dev/null || /opt/mssql-tools/bin/sqlcmd -S 127.0.0.1 -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\" >/dev/null",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

volumes:
  mssql-standalone-data:
