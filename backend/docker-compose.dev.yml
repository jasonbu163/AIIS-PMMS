name: aiis-pmms

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: aiis-pmms-backend-dev
    env_file:
      - .env.docker
    environment:
      UV_LINK_MODE: copy
    depends_on:
      mssql-dev:
        condition: service_healthy
    ports:
      - "18080:8000"
    volumes:
      - .:/app
      - api-venv:/app/.venv
      - uv-cache:/root/.cache/uv
    command: /bin/sh -lc "uv sync --frozen --no-dev && uv run --no-sync python -m scripts.ensure_database && uv run --no-sync alembic upgrade head && uv run --no-sync uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  mssql-dev:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: aiis-pmms-mssql-dev
    env_file:
      - .env.docker
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - mssql-dev-data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S 127.0.0.1 -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" >/dev/null || /opt/mssql-tools/bin/sqlcmd -S 127.0.0.1 -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\" >/dev/null",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
volumes:
  api-venv:
  mssql-dev-data:
  uv-cache:
