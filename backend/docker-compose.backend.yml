name: aiis-pmms-backend

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: aiis-pmms-backend
    env_file:
      - .env.backend.docker.example
      - path: .env.backend.docker
        required: false
    environment:
      TZ: Asia/Shanghai
    ports:
      - "18080:8000"
    volumes:
      - backend-storage:/app/storage
    command: /bin/sh -lc "uv run --no-sync python -m scripts.ensure_database && uv run --no-sync alembic upgrade head && uv run --no-sync python main.py"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  backend-storage:
